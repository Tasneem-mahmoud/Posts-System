<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts Managment System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    
<h1 class="text-info text-center mt-4">Posts Managment System</h1>
<button id="AddNewPostBtn" class="btn btn-outline-success m-4" data-bs-toggle="modal" data-bs-target="#formContainer">Add New Post</button>
<div id="formContainer" class="hidden modal"  tabindex="-1">
      <div class="modal-dialog">
       <div class="modal-content">
            <div class="modal-header">
                <h2 id="formTitle" class="modal-title">Add Post</h2>
                <!-- <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button> -->

            </div>

            <div class="modal-body">
                <form id="postForm" method="POST">
                    
            
        <input type="hidden" name="postId" id="postId">

        <div class="input-group mb-3">
            <label for="postTitle" class="input-group-text" >Title : </label>
            <input type="text" name="postTitle" id="postTitle" class="form-control">
        </div>

         <div class="input-group mb-3">
            <label for="postBody" class="input-group-text">Body :</label>
            <textarea name="postBody" id="postBody" class="form-control" aria-label="With textarea"></textarea>
        </div>
     </div>
        <div class="modal-footer">
            <button type="submit" class="btn btn-outline-info mx-3">Submit</button>
            <button type="button" id="cancelBtn" class="btn btn-outline-secondary">Cancel</button>
        </div>
    </form>
    </div>
</div>

</div>
      

<div id="alertContainer"></div>

<table id="postTable"  class="table table-light table-striped table-hover">
    <thead>
        <tr>
            <th>Post ID</th>
            <th>Post Title</th>
            <th>Post Body</th>
        </tr>
    </thead>

    <tbody></tbody>
</table>

    <script src="JS/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous" type="module"></script>
</body>
</html>
